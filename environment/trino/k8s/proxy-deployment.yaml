apiVersion: apps/v1
kind: Deployment
metadata:
  name: warpstream-iceberg-proxy
  namespace: trino
  labels:
    app: warpstream-iceberg-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: warpstream-iceberg-proxy
  template:
    metadata:
      labels:
        app: warpstream-iceberg-proxy
    spec:
      containers:
      - name: nginx
        image: nginx:alpine
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: WARPSTREAM_AGENT_KEY
          valueFrom:
            secretKeyRef:
              name: warpstream-agent-apikey
              key: apikey
        volumeMounts:
        - name: config
          mountPath: /etc/nginx/nginx.conf.template
          subPath: nginx.conf
        - name: config
          mountPath: /docker-entrypoint.d/10-envsubst.sh
          subPath: entrypoint.sh
        command: ["/bin/sh"]
        args:
          - -c
          - |
            apk add --no-cache gettext
            envsubst '${WARPSTREAM_AGENT_KEY}' < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf
            exec nginx -g 'daemon off;'
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "64Mi"
            cpu: "100m"
          limits:
            memory: "128Mi"
            cpu: "200m"
      volumes:
      - name: config
        configMap:
          name: warpstream-proxy-config
          defaultMode: 0755
