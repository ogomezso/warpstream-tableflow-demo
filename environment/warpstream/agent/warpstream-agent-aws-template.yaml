replicas: 1

autoscaling:
  enabled: false

serviceAccount:
  create: true
  name: warpstream-agent

# AWS S3 storage configuration
config:
  bucketURL: '<BUCKET_URL>'
  virtualClusterID: <VIRTUAL_CLUSTER_ID>
  region: <WARPSTREAM_CONTROL_PLANE_REGION>
  agentKey: <AGENT_KEY>

extraEnv:
  - name: WARPSTREAM_DEFAULT_VIRTUAL_CLUSTER_ID
    value: "<VIRTUAL_CLUSTER_ID>"

  - name: WARPSTREAM_REGION
    value: "<WARPSTREAM_CONTROL_PLANE_REGION>"

  # For local/non-cloud deployments, explicitly set the availability zone
  # This prevents errors when the agent cannot auto-detect the zone
  - name: WARPSTREAM_AVAILABILITY_ZONE
    value: "local-k8s-cluster"

  # AWS credentials
  - name: AWS_ACCESS_KEY_ID
    valueFrom:
      secretKeyRef:
        name: aws-storage-credentials
        key: aws-access-key-id
  - name: AWS_SECRET_ACCESS_KEY
    valueFrom:
      secretKeyRef:
        name: aws-storage-credentials
        key: aws-secret-access-key
  - name: AWS_SESSION_TOKEN
    valueFrom:
      secretKeyRef:
        name: aws-storage-credentials
        key: aws-session-token
        optional: true
  - name: AWS_REGION
    value: "<AWS_REGION>"
---
apiVersion: v1
kind: Secret
metadata:
  name: aws-storage-credentials
  namespace: warpstream
type: Opaque
stringData:
  aws-access-key-id: "<AWS_ACCESS_KEY_ID>"
  aws-secret-access-key: "<AWS_SECRET_ACCESS_KEY>"
  aws-session-token: "<AWS_SESSION_TOKEN>"
