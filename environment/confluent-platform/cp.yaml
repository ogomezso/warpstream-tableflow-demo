apiVersion: platform.confluent.io/v1beta1
kind: SchemaRegistry
metadata:
  name: schemaregistry
  namespace: confluent
spec:
  replicas: 1
  podTemplate:
    resources:
      limits:
        memory: 512Mi
        cpu: 200m
      requests:
        memory: 256Mi
        cpu: 100m
  image:
    application: confluentinc/cp-schema-registry:8.1.0
    init: confluentinc/confluent-init-container:3.1.0
  dependencies:
    kafka:
      bootstrapEndpoint: kafka.confluent.svc.cluster.local:9092
  configOverrides:
    server:
      - sni.host.check.enabled=false
---
apiVersion: platform.confluent.io/v1beta1
kind: Connect
metadata:
  name: connect
  namespace: confluent
spec:
  replicas: 1
  podTemplate:
    resources:
      limits:
        memory: 2048Mi
        cpu: 1500m
      requests:
        memory: 1536Mi
        cpu: 500m
    probe:
      liveness:
        initialDelaySeconds: 300
      readiness:
        initialDelaySeconds: 240
  image:
    application: confluentinc/cp-server-connect:8.1.0
    init: confluentinc/confluent-init-container:3.1.0
  build:
    type: onDemand
    onDemand:
      plugins:
        confluentHub:
          - name: kafka-connect-datagen
            owner: confluentinc
            version: 0.6.8
  dependencies:
    kafka:
      bootstrapEndpoint: kafka.confluent.svc.cluster.local:9092
    schemaRegistry:
      url: http://schemaregistry.confluent.svc.cluster.local:8081
  configOverrides:
    server:
      - "sni.host.check.enabled=false"
      - "offset.storage.replication.factor=1"
      - "config.storage.replication.factor=1"
      - "status.storage.replication.factor=1"
---
apiVersion: platform.confluent.io/v1beta1
kind: ControlCenter
metadata:
  name: controlcenter-ng
  namespace: confluent
spec:
  replicas: 1
  podTemplate:
    resources:
      limits:
        memory: 2048Mi
        cpu: 500m
      requests:
        memory: 1024Mi
        cpu: 200m
  image:
    application: confluentinc/cp-enterprise-control-center-next-gen:2.3.0
    init: confluentinc/confluent-init-container:3.1.0
  dataVolumeCapacity: 2Gi
  dependencies:
    prometheusClient:
      url: http://controlcenter-ng.confluent.svc.cluster.local:9090
    alertManagerClient:
      url: http://controlcenter-ng.confluent.svc.cluster.local:9093
    schemaRegistry:
      url: http://schemaregistry.confluent.svc.cluster.local:8081
    connect:
      - name: connect
        url: http://connect.confluent.svc.cluster.local:8083
    kafka:
      bootstrapEndpoint: kafka.confluent.svc.cluster.local:9092
  services:
    prometheus:
       image: confluentinc/cp-enterprise-prometheus:2.2.1
       pvc:
         dataVolumeCapacity: 2Gi
    alertmanager:
       image: confluentinc/cp-enterprise-alertmanager:2.2.1
  configOverrides:
    server:
      - sni.host.check.enabled=False
      - confluent.controlcenter.connect.cluster=connect|http://connect.confluent.svc.cluster.local:8083
      - confluent.controlcenter.internal.topics.replication=1
      - confluent.controlcenter.command.topic.replication=1
      - confluent.controlcenter.command.topic.min.insync.replicas=1
---
